services:
  postgres:
    image: postgres:18.1-alpine
    container_name: perigon-postgresql-sample
    environment:
      POSTGRES_DB: perigon_sample
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d perigon_sample"]
      interval: 3s
      timeout: 3s
      retries: 20
